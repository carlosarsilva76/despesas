<style>
  :root{
    --ink:#14181d; --muted:#5c6670; --line:#e3e7e5; --surface:#fff;
    --bg:#eef3f6; --accent:#1B92C6; --accent-d:#1576a0; --accent-soft:#e3f3fb;
    --warn:#b45309; --warn-soft:#f9eddb; --ok:#1B92C6; --danger:#b42318;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --ui:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif; --nav-h:64px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:var(--ui);cursor:pointer}
  input,select{font-family:var(--ui);font-size:16px}
  .hidden{display:none!important}
  .logo{height:66px;width:auto;max-width:60%;display:block;margin:0 auto 16px}
  .logo-sm{height:30px;width:auto;margin-bottom:4px}
  .gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate .box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px;width:100%;max-width:380px}
  .gate h1{font-size:20px;margin:0 0 4px;text-align:center}
  .gate p{color:var(--muted);font-size:13px;margin:0 0 18px;text-align:center}
  .gate label{font-size:12px;color:var(--muted);display:block;margin:12px 0 5px}
  .gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:600;width:100%;margin-top:18px}
  .btn:active{background:var(--accent-d)}
  .btn.sec{background:var(--accent-soft);color:var(--accent)}
  .msg{font-size:13px;margin-top:12px;text-align:center}
  .msg.err{color:var(--danger)} .msg.ok{color:var(--ok)}
  .app{max-width:720px;margin:0 auto;padding:18px 16px calc(var(--nav-h) + 28px)}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .top h1{font-size:19px;margin:0}
  .logout{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px}
  .card.total{background:#f4fafd;border-color:#bcdef0}
  .card h2{font-size:13px;font-weight:600;margin:0 0 12px}
  .clinic-name{font-size:15px;font-weight:600}
  .clinic-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .chips{display:flex;gap:12px;flex-wrap:wrap}
  .chip{flex:1;min-width:130px;border-radius:11px;padding:13px 14px}
  .chip.cash{background:var(--accent-soft);border:1px solid #bcdef0}
  .chip.warn{background:var(--warn-soft);border:1px solid #e6cf9f}
  .chip.plain{background:#f3f6f8;border:1px solid var(--line)}
  .chip .k{font-size:11px;font-weight:600}
  .chip.cash .k{color:var(--ok)} .chip.warn .k{color:var(--warn)} .chip.plain .k{color:var(--muted)}
  .chip .big{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:21px;font-weight:600;margin-top:2px}
  .chip.cash .big{color:var(--ok)} .chip.warn .big{color:var(--warn)}
  .chip .note{font-size:11px;color:var(--muted);margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px}
  th{text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:600;padding-bottom:7px}
  th:first-child{text-align:left}
  td{padding:6px 0;border-top:1px solid var(--line);font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}
  td:first-child{font-family:var(--ui);text-align:left}
  tr.tot td{font-weight:600;border-top:2px solid var(--line)}
  .sechead{font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin:16px 0 0}
  .drop{border:1.5px dashed var(--line);border-radius:11px;padding:18px;text-align:center;color:var(--muted);font-size:13px;display:block}
  .drop.hot{border-color:var(--accent);background:var(--accent-soft);color:var(--ink)}
  .drop strong{color:var(--accent)}
  input[type=file]{display:none}
  .preview{margin-top:12px;font-size:13px}
  .row{display:flex;gap:10px;margin-top:10px}.row>*{flex:1}
  label.fld{font-size:12px;color:var(--muted);display:block;margin:10px 0 5px}
  .fld-in{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px}
  .chk{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:14px}
  .chk input{width:18px;height:18px}
  .pills{display:flex;gap:6px;background:#e8eef2;border-radius:11px;padding:4px}
  .pills button{flex:1;border:none;background:none;border-radius:8px;padding:8px 4px;font-size:12px;font-weight:600;color:var(--muted)}
  .pills button.on{background:#fff;color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + 16px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:99px;font-size:13px;z-index:50;opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}
  nav.tabs{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}
  nav.tabs button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:8px}
  nav.tabs button.on{color:var(--accent)}
  nav.tabs .ic{width:22px;height:22px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}
</style>
</head>
<body>

<div id="scrSetup" class="gate">
  <div class="box">
    <img class="logo" src="Logo_power_point.png" alt="Dentalsaúde" onerror="this.style.display='none'">

    <p>Cola a chave pública (anon) do teu projeto. Fica guardada só neste dispositivo.</p>
    <label>URL do projeto</label>
    <input id="cfgUrl" value="https://dcoeclhvtpwefdvbhfzh.supabase.co">

    <input id="cfgKey" placeholder="eyJ...">
    <button class="btn" onclick="doConnect()">Ligar</button>

<div id="scrLogin" class="gate hidden">

    <label>Email</label><input id="logEmail" type="email" autocomplete="username">
    <label>Password</label><input id="logPass" type="password" autocomplete="current-password">

    <button class="logout" style="margin-top:14px;display:block;width:100%;text-align:center" onclick="resetCfg()">Mudar projeto Supabase</button>
  </div>
</div>

<div id="scrApp" class="app hidden">
  <div class="top">
    <div>
      <img class="logo-sm" src="Logo_power_point.png" alt="Dentalsaúde" onerror="this.style.display='none'">
      <h1 id="viewTitle">Resumo</h1>
    </div>
    <button class="logout" onclick="doLogout()">Sair</button>
  </div>
  <div id="viewResumo"></div>
  <div id="viewImportar" class="hidden"></div>
  <div id="viewLancar" class="hidden"></div>
  <div id="viewRelatorios" class="hidden"></div>
  <div id="viewMedicos" class="hidden"></div>

</div>

<nav class="tabs hidden" id="nav">
  <button data-v="Resumo" class="on" onclick="go('Resumo')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z"/></svg>Resumo</button>
  <button data-v="Importar" onclick="go('Importar')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4m0 0l-4 4m4-4l4 4M4 18v2h16v-2"/></svg>Importar</button>
  <button data-v="Lançar" onclick="go('Lançar')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Lançar</button>
  <button data-v="Relatórios" onclick="go('Relatórios')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5m0 14h16M8 15l3-4 3 2 4-6"/></svg>Relatórios</button>
  <button data-v="Médicos" onclick="go('Médicos')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg>Médicos</button>
  <button data-v="Registos" onclick="go('Registos')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Registos</button>
  <button data-v="Docs" onclick="go('Docs')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l5 5v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z"/><path d="M14 3v5h5"/></svg>Docs</button>
</nav>
<div id="toast" class="toast"></div>

<script>
const V='3.11.174';
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc=`https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${V}/pdf.worker.min.js`;
let sb=null, clinics=[], clinicByName={}, clinicById={}, medicos=[], medSel=null, UID=null;
const $=id=>document.getElementById(id);
const fmt=n=>(n==null?'—':Number(n).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €');
const todayISO=()=>new Date().toISOString().slice(0,10);
const monthStart=()=>{const d=new Date();d.setDate(1);return d.toISOString().slice(0,10);};
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2300);}
function show(id){['scrSetup','scrLogin','scrApp'].forEach(s=>$(s).classList.toggle('hidden',s!==id));$('nav').classList.toggle('hidden',id!=='scrApp');}
function getCfg(){try{return JSON.parse(localStorage.getItem('caixa_cfg')||'null')}catch(e){return null}}
function resetCfg(){localStorage.removeItem('caixa_cfg');location.reload();}

async function boot(){
  const cfg=getCfg();
  if(!cfg){show('scrSetup');return;}
  sb=supabase.createClient(cfg.url,cfg.key);
  const {data}=await sb.auth.getSession();
  if(data.session){await onLogin();}else{show('scrLogin');}
}
function doConnect(){
  const url=$('cfgUrl').value.trim(), key=$('cfgKey').value.trim();
  if(!url||!key){$('setupMsg').className='msg err';$('setupMsg').textContent='Preenche o URL e a chave.';return;}
  localStorage.setItem('caixa_cfg',JSON.stringify({url,key}));boot();
}
async function doLogin(){
  $('loginMsg').textContent='A entrar…';$('loginMsg').className='msg';
  const {error}=await sb.auth.signInWithPassword({email:$('logEmail').value.trim(),password:$('logPass').value});
  if(error){$('loginMsg').className='msg err';$('loginMsg').textContent=error.message;return;}
  await onLogin();
}
async function doLogout(){await sb.auth.signOut();location.reload();}
async function onLogin(){try{UID=(await sb.auth.getUser()).data.user.id;}catch(e){}await ensureClinics();await ensureMedicos();show('scrApp');go('Resumo');}
async function ensureClinics(){
  let {data}=await sb.from('caixa_clinicas').select('id,nome');
  if(!data||!data.length){
    await sb.from('caixa_clinicas').insert([{nome:'Paredes'},{nome:'Póvoa de Lanhoso'}]);
    ({data}=await sb.from('caixa_clinicas').select('id,nome'));
  }
  clinics=data||[];clinicByName={};clinicById={};
  clinics.forEach(c=>{clinicByName[c.nome]=c.id;clinicById[c.id]=c.nome;});
}

function go(v){
  $('viewTitle').textContent=v;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  ['Resumo','Importar','Lançar','Relatórios','Médicos','Registos','Docs'].forEach(x=>$('view'+x.normalize('NFD').replace(/[\u0300-\u036f]/g,'')).classList.toggle('hidden',x!==v));
  if(v==='Resumo')renderResumo();
  if(v==='Importar')renderImportar();
  if(v==='Lançar')renderLancar();
  if(v==='Relatórios')renderRelatorios();
  if(v==='Médicos')renderMedicos();
  if(v==='Registos')renderRegistos();
  if(v==='Docs')renderDocs();
}

/* ===================== parsing ===================== */
const MONEY=/\d{1,3}(?:\.\d{3})*,\d{2}/;
const val=s=>parseFloat(s.replace(/\./g,'').replace(',','.'));
const METODO={'Numerário':'numerario','Cartão de débito':'mb','Multibanco':'mb','Transferência bancária':'tb','Transferência':'tb','Cheque':'cheque'};
const MEIO_LBL={numerario:'Numerário',mb:'Multibanco',tb:'Transferência',cheque:'Cheque-dentista',outros:'Outros'};
function clinicKey(s){return /[Pp][óo]voa/.test(s)?'Póvoa de Lanhoso':(/Paredes/.test(s)?'Paredes':s);}
function classifySerie(s){
  const sinal=/^NC/i.test(s)?-1:1;
  if(/^2026$/.test(s)) return {categoria:'externo',clinica:null,sinal};
  const clinica=/PL/.test(s)?'Póvoa de Lanhoso':'Paredes';
  if(/CD/.test(s)) return {categoria:'cheque_dentista',clinica,sinal};
  return {categoria:'clinico',clinica,sinal};
}
async function getRows(file){
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;const rows=[];
  for(let p=1;p<=pdf.numPages;p++){
    const tc=await (await pdf.getPage(p)).getTextContent();
    const items=tc.items.map(it=>({x:it.transform[4],y:it.transform[5],s:it.str})).filter(it=>it.s.trim()!=='');
    const b=[];for(const it of items){let g=b.find(k=>Math.abs(k.y-it.y)<=3);if(!g){g={y:it.y,items:[]};b.push(g);}g.items.push(it);}
    b.sort((a,b)=>b.y-a.y);for(const g of b){g.items.sort((a,b)=>a.x-b.x);rows.push({x0:g.items[0].x,text:g.items.map(i=>i.s).join(' ').replace(/\s+/g,' ').trim()});}
  }return rows;
}
function parseFolha(rows){
  const sec=['Numerário','Cheque','Multibanco','Dívida'];
  const map={'Numerário':'numerario','Cheque':'cheque','Multibanco':'mb','Outros':'outros','Em Dívida':'divida','TOTAL':'total'};
  const o={clinica:null,data:null,totais:{},linhas:[]};let cur=null;
  for(const r of rows){const t=r.text;let m;
    if(m=t.match(/Data:\s*(\d{2}-\d{2}-\d{4})/))o.data=m[1].split('-').reverse().join('-');
    if(t.startsWith('Dentalsaúde -'))o.clinica=clinicKey(t);
    if(sec.includes(t)&&r.x0<60){cur=t;continue;}
    const rm=t.match(/^(Numerário|Cheque|Multibanco|Outros|Em Dívida|TOTAL):\s*(.*)$/);
    if(rm){const v=(rm[2].match(MONEY)||[])[0];if(v){o.totais[map[rm[1]]]=val(v);continue;}}
    const pm=t.match(/^(.+?)\s+(\d{1,3}(?:\.\d{3})*,\d{2})\s+(\d+)$/);
    if(pm&&cur&&r.x0<60)o.linhas.push({meio:map[cur],nome:pm[1].trim(),valor:val(pm[2])});
  }return o;
}
function parseLiq(rows){
  const re=/(\d{2}\/\d{2}\/\d{4})\s+RC\s+\S+\s+(FR|NC|FT|RC)\s+([A-Za-z]+\d{4})\/(\d+)\s+(.+?)\s+(\d{1,3}(?:\.\d{3})*,\d{2})\s+(\d{1,3}(?:\.\d{3})*,\d{2})/;
  const out=[];
  for(const r of rows){const m=r.text.match(re);if(!m)continue;
    const serie=m[3],num=m[4],metodoTxt=m[5].trim(),liq=val(m[7]);
    const c=classifySerie(serie);
    const meio=METODO[metodoTxt]||'outros';
    out.push({data:m[1].split('/').reverse().join('-'),serie,documento_ref:`${serie}/${num}`,
      categoria:c.categoria,clinica:c.clinica,meio,valor:liq*c.sinal});
  }return out;
}
function parseLiqExcel(rows){
  const norm=s=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const num=s=>{if(s==null||s==='')return 0;if(typeof s==='number')return s;s=String(s).trim();return s.includes(',')?(parseFloat(s.replace(/\./g,'').replace(',','.'))||0):(parseFloat(s)||0);};
  const normData=s=>{s=String(s==null?'':s).trim();let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{2})[\/-](\d{2})[\/-](\d{4})/);if(m)return `${m[3]}-${m[2]}-${m[1]}`;return s.slice(0,10);};
  let hr=-1, col={};
  for(let i=0;i<rows.length;i++){
    const r=(rows[i]||[]).map(norm);
    if(r.includes('documento') && r.some(c=>c.includes('valor liquidado'))){
      hr=i; r.forEach((c,j)=>{
        if(c==='documento') col.doc=j;
        else if(c.includes('metodo de pagamento')) col.met=j;
        else if(c.includes('valor liquidado')) col.val=j;
        else if(c.includes('data de liquid')) col.data=j;
      }); break;
    }
  }
  if(hr<0) throw new Error('Não encontrei o cabeçalho do mapa (Documento / Valor liquidado).');
  const out=[], docRe=/(FR|NC|FT|RC)\s*([A-Za-z]*\d{4})\/(\d+)/;
  for(let i=hr+1;i<rows.length;i++){
    const r=rows[i]||[]; const doc=String(r[col.doc]==null?'':r[col.doc]);
    const m=doc.match(docRe); if(!m) continue;
    const serie=m[2], n=m[3]; const c=classifySerie(serie);
    const meio=METODO[String(r[col.met]==null?'':r[col.met]).trim()]||'outros';
    const liq=num(r[col.val]);
    out.push({data:normData(r[col.data]),serie,documento_ref:`${serie}/${n}`,
      categoria:c.categoria,clinica:c.clinica,meio,valor:liq*c.sinal});
  }
  return out;
}

const IVA=1.06;
let listData={protese:[],branq:[],orto:[]};
function pacienteOf(bb){
  const CODE=/^(D\.O\.|C\.\d|CIR\.|ENDO\.|PERIO\.|P\.R\.|PRFL|IMAG\.|ORTO|BR\.)/;
  const TOOTH=/^\d{1,2},?$/, MON=/^\d{1,3}(?:\.\d{3})*,\d{2}$/;
  const m=bb.match(/\d{2}-\d{2}-\d{4}\s+(.*)/); let toks=(m?m[1]:bb).split(' ');
  if(toks.length && (TOOTH.test(toks[0])||CODE.test(toks[0]))){
    while(toks.length && MON.test(toks[toks.length-1])) toks.pop();
    const name=[];
    for(let i=toks.length-1;i>=0;i--){const t=toks[i];
      if(/^[A-ZÀ-Ý]/.test(t)&&!/\d/.test(t)) name.unshift(t); else break;}
    return name.join(' ');
  }
  const name=[];
  for(const t of toks){ if(TOOTH.test(t)||CODE.test(t)) break; name.push(t); }
  return name.join(' ');
}
function parseListagem(rows){
  const full=rows.map(r=>r.text).join('\n');
  const ptm=full.match(/Total:\s*(\d{1,3}(?:\.\d{3})*,\d{2})/);
  const printedTotal=ptm?parseFloat(ptm[1].replace(/\./g,'').replace(',','.')):null;
  let texto=full.replace(/Total:[\s\S]*/,'');
  const blocos=texto.split(/Dra Ana Sofia/);
  const RE=/\d{1,3}(?:\.\d{3})*,\d{2}/g;
  const v=s=>parseFloat(s.replace(/\./g,'').replace(',','.'));
  const seen=new Set();
  let tot=0,orto=0,exames=0,br=0,pr=0,prfl=0,nrec=0,c04n=0;
  const protese=[],branq=[],ortoL=[];
  const dscOf=(bb,re)=>{const m=bb.match(re);return m?m[1].replace(/\s+/g,' ').trim():'';};
  for(const b of blocos){
    const ms=b.match(RE); if(!ms) continue;
    const bb=b.replace(/\s+/g,' ').trim(); if(seen.has(bb)) continue; seen.add(bb);
    const x=v(ms[0]); tot+=x; nrec++;
    const d=bb.match(/(\d{2}-\d{2}-\d{4})/); const data=d?d[1]:''; const pac=pacienteOf(bb);
    if(/IMAG/.test(b)) exames+=x;
    else if(/\bC\.04\b/.test(b)) c04n++;
    else if(/ORTO/.test(b)){ orto+=x; ortoL.push({data,pac,desc:dscOf(bb,/(ORTO[\.\s-]*\d*[^0-9]*?)\s+\d{1,3}(?:\.\d{3})*,\d{2}/)||'Ortodontia',v:x,custo:0}); }
    else if(/BR\.\d|branqueament/i.test(b)){ br+=x; branq.push({data,pac,desc:dscOf(bb,/(BR\.\d+[^0-9]*?)\s+\d{1,3}(?:\.\d{3})*,\d{2}/)||'Branqueamento',v:x,custo:0}); }
    else if(/PRFL/.test(b)){ prfl+=x; protese.push({data,pac,desc:dscOf(bb,/(PRFL\S*.*?)\s+\d{1,3}(?:\.\d{3})*,\d{2}/)||'Prótese flexível',v:x,custo:0}); }
    else if(/P\.R\./.test(b)){ pr+=x; protese.push({data,pac,desc:dscOf(bb,/(P\.R\.\d+.*?)\s+\d{1,3}(?:\.\d{3})*,\d{2}/)||'Prótese',v:x,custo:0}); }
  }
  return {tot,printedTotal,orto,exames,c04:c04n*10,c04n,br,pr,prfl,nrec,protese,branq,ortoList:ortoL};
}
async function readExcel(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
}
function parseExcel(rows){
  const v=s=>{if(s==null||s==='')return 0;s=String(s).trim();return s.includes(',')?(parseFloat(s.replace(/\./g,'').replace(',','.'))||0):(parseFloat(s)||0);};
  const money=/^\d{1,3}(?:\.\d{3})*,\d{2}$/;
  const code=/(\b[A-Z]{1,6}\.\s*-?\s*\d)|ORTO|IMAG|Exame Cl|Remoção|Destartar|Tratamento de|Dentisteria|Exodontia|Prostodontia/;
  const nameRe=/^[A-ZÀ-Ý][a-zà-ÿ]+(?:\s+[A-Za-zÀ-ÿ.]+){1,6}$/;
  const n=rows.reduce((m,r)=>Math.max(m,r.length),0);
  const cnt=Array.from({length:n},()=>({money:0,code:0,name:0}));
  for(const r of rows) for(let j=0;j<n;j++){const c=(r[j]==null?'':String(r[j]).trim());
    if(money.test(c))cnt[j].money++; if(code.test(c))cnt[j].code++; if(nameRe.test(c)&&!/\d/.test(c))cnt[j].name++;}
  let valueCol=0; for(let j=1;j<n;j++) if(cnt[j].money>cnt[valueCol].money) valueCol=j;
  let tratCol=-1; for(let j=0;j<n;j++){ if(j===valueCol)continue; if(tratCol<0||cnt[j].code>cnt[tratCol].code) tratCol=j; }
  let pacCol=-1; for(let j=0;j<n;j++){ if(j===valueCol||j===tratCol)continue; if(pacCol<0||cnt[j].name>cnt[pacCol].name) pacCol=j; }
  let tot=0,orto=0,exames=0,c04n=0,br=0,pr=0,prfl=0,nrec=0;
  const protese=[],branq=[],ortoL=[];
  for(const r of rows){
    const pac=(r[pacCol]||'').toString().trim();
    const trat=(r[tratCol]||'').toString();
    if(!trat.trim()) continue;
    const x=v(r[valueCol]); const desc=trat.replace(/\s+/g,' ').trim();
    nrec++; tot+=x;
    if(/IMAG/.test(trat)) exames+=x;
    else if(/\bC\.04\b/.test(trat)) c04n++;
    else if(/ORTO/.test(trat)){ orto+=x; ortoL.push({data:'',pac,desc,v:x,custo:0}); }
    else if(/\bBR\.\d|ranqueament/i.test(trat)){ br+=x; branq.push({data:'',pac,desc,v:x,custo:0}); }
    else if(/PRFL/.test(trat)){ prfl+=x; protese.push({data:'',pac,desc,v:x,custo:0}); }
    else if(/P\.R\./.test(trat)){ pr+=x; protese.push({data:'',pac,desc,v:x,custo:0}); }
  }
  return {tot,printedTotal:null,orto,exames,c04:c04n*10,c04n,br,pr,prfl,nrec,protese,branq,ortoList:ortoL};
}
function costTable(title,key,arr,iva=true){

}

function parseCGD(rows){
  const t=rows.map(r=>r.text).join('\n');
  const mont=t.match(/Montante\s+(\d{1,3}(?:\.\d{3})*,\d{2})/);
  const data=t.match(/Data valor\s+(\d{2}-\d{2}-\d{4})/);
  const term=t.match(/(\d{6,})\s+POS\s+VENDAS/i);
  return {valor:mont?val(mont[1]):null, data:data?data[1].split('-').reverse().join('-'):null, terminal:term?term[1]:null};
}
async function readText(file){const buf=await file.arrayBuffer();return new TextDecoder('iso-8859-1').decode(buf);}
function parseCGDcsv(text){
  const lines=text.split(/\r?\n/);
  const hi=lines.findIndex(l=>/^Data_Hora/.test(l));
  if(hi<0) throw new Error('CSV não reconhecido (falta o cabeçalho Data_Hora).');
  const num=s=>{s=String(s==null?'':s).trim();return s?(parseFloat(s.replace(/\./g,'').replace(',','.'))||0):0;};
  const g={};
  for(let i=hi+1;i<lines.length;i++){
    const l=lines[i]; if(!l.trim()) continue;
    const c=l.split(';').map(x=>x.trim());
    if(!/^\d{2}-\d{2}-\d{4}/.test(c[0])) continue;
    const term=(c[3]||'').replace(/\D/g,'').slice(-8);
    const nome=TERMINALS[term]; if(!nome) continue;
    const data=c[0].slice(0,10).split('-').reverse().join('-');
    const k=term+'|'+data;
    (g[k]=g[k]||{nome,data,gross:0,net:0,n:0});
    g[k].gross+=num(c[9]); g[k].net+=num(c[13]); g[k].n++;
  }
  return Object.values(g);
}

function bensRefs(ex){return new Set(ex.filter(x=>x.categoria==='venda_bens'&&x.documento_ref).map(x=>x.documento_ref));}
let resumoCache=null, concMes='';
function curMonth(){return todayISO().slice(0,7);}
function buildConc(mes){
  const {f,l,rcb,bens}=resumoCache;
  const inM=ds=>ds&&ds.slice(0,7)===mes;
  const lblM={mb:'Multibanco',tb:'Transferência',cheque:'Cheque',numerario:'Numerário'};
  const rec={mb:0,tb:0,cheque:0,numerario:0}, liq={mb:0,tb:0,cheque:0,numerario:0};
  f.forEach(x=>{if(!inM(x.data))return; rec.numerario+=+x.total_numerario; rec.mb+=+x.total_mb; rec.cheque+=+(x.total_cheque||0);});
  rcb.forEach(x=>{if(!inM(x.data_valor))return; if(rec[x.meio]!=null)rec[x.meio]+=+x.valor;});
  l.forEach(x=>{if(!inM(x.data_liq))return; if(x.categoria==='clinico'&&liq[x.meio]!=null&&!bens.has(x.documento_ref))liq[x.meio]+=+x.valor;});
  const tol=0.01, alertM=['mb','tb','cheque'];
  const anyAlert=alertM.some(m=>Math.abs(rec[m]-liq[m])>=tol);
  let cRows='';
  ['mb','tb','cheque','numerario'].forEach(m=>{
    const diff=rec[m]-liq[m], isAlert=alertM.includes(m)&&Math.abs(diff)>=tol;
    const color=isAlert?'var(--danger)':(m==='numerario'?'var(--muted)':'var(--ok)');
    cRows+=`<tr><td>${lblM[m]}</td><td>${fmt(rec[m])}</td><td>${fmt(liq[m])}</td><td style="color:${color};font-weight:600">${fmt(diff)}${isAlert?' ⚠':''}</td></tr>`;
  });
  return {anyAlert,html:`<table><tr><th>Método</th><th>Recebido</th><th>TOConline</th><th>Diferença</th></tr>${cRows}</table>
    <div class="note" style="margin-top:6px;color:var(--muted)">MB, transferência e cheque devem bater certo. No numerário é normal haver diferença (recebido antes de faturar).</div>`};
}
function setConcMes(m){concMes=m;refreshConc();}

}

      if(c.valor==null||!c.data||!c.terminal){p.innerHTML='<span style="color:var(--danger)">Não consegui ler o comprovativo.</span>';return;}
      const nome=TERMINALS[c.terminal];
      if(!nome){p.innerHTML=`<span style="color:var(--danger)">Terminal ${c.terminal} não reconhecido.</span>`;return;}
      groups=[{nome,data:c.data,net:c.valor,gross:null,n:null}];
    }
    if(!groups.length){p.innerHTML='<span style="color:var(--danger)">Sem movimentos reconhecidos.</span>';return;}
    pend.cgd=groups;
    const outra=groups.some(g=>g.nome!==impClin);
    const aviso=outra?`<div style="color:var(--warn);margin-bottom:6px">Nota: há movimentos de outra clínica; cada um é atribuído pela clínica do terminal.</div>`:'';
    let t=aviso+`<table><tr><th>Clínica</th><th>Data</th><th>MB real</th><th>Comissão</th></tr>`;
    groups.forEach(g=>{const com=(g.gross!=null)?(g.gross-g.net):null;
      t+=`<tr><td>${g.nome}</td><td>${g.data}</td><td>${fmt(g.net)}</td><td>${com!=null?fmt(com):'—'}</td></tr>`;});
    t+=`</table><button class="btn" onclick="saveCGD()">Guardar MB real</button>`;
    p.innerHTML=t;
  }catch(e){p.innerHTML='<span style="color:var(--danger)">'+e.message+'</span>';}
}
async function saveCGD(){
  const gs=pend.cgd; if(!gs||!gs.length)return;
  let ok=0,fail=0;
  for(const g of gs){
    const cid=clinicByName[g.nome]; if(!cid){fail++;continue;}
    let folha=null;
    for(let off=0;off<=4 && !folha;off++){
      const d=new Date(g.data);d.setDate(d.getDate()-off);const ds=d.toISOString().slice(0,10);
      const {data}=await sb.from('caixa_folhas').select('id,total_mb,data').eq('clinica_id',cid).eq('data',ds).maybeSingle();
      if(data)folha=data;
    }
    if(!folha){fail++;continue;}
    const {error}=await sb.from('caixa_folhas').update({mb_real:g.net}).eq('id',folha.id);
    if(error)fail++;else ok++;
  }
  toast(`MB real: ${ok} gravado(s)${fail?` · ${fail} sem folha`:''} ✓`);
  if(!fail){$('pC').innerHTML='';pend.cgd=null;}
}

async function delSelected(){
  const chks=[...document.querySelectorAll('.rgChk:checked')];

  if(!confirm(`Apagar ${chks.length} registo(s)? Esta ação não se desfaz.`)) return;
  const byT={};
  chks.forEach(c=>{const i=c.value.indexOf('|');const t=c.value.slice(0,i),id=c.value.slice(i+1);(byT[t]=byT[t]||[]).push(id);});
  let err=null;
  for(const t in byT){const {error}=await sb.from(t).delete().in('id',byT[t]);if(error)err=error;}
  if(err){toast('Erro: '+err.message);return;}
  toast(`${chks.length} registo(s) apagado(s) ✓`); loadRegistos();
}

    after:o=>{o.total_geral=(+o.total_numerario||0)+(+o.total_mb||0)+(+o.total_cheque||0)+(+o.total_outros||0)+(+o.total_divida||0);}},
  caixa_depositos:{titulo:'Depósito',fields:[['data','date','Data'],['valor','num','Valor'],['meio','meio','Meio'],['descricao','text','Descrição']]},
  caixa_recebimentos:{titulo:'Recebimento avulso',fields:[['data_valor','date','Data'],['valor','num','Valor'],['meio','meio','Meio'],['descricao','text','Descrição']]},
  caixa_extra:{titulo:'Cheque-dentista / Externo / Venda',fields:[['data','date','Data'],['valor_faturado','num','Faturado'],['valor_recebido','num','Recebido'],['descricao','text','Descrição']]},
  caixa_liquidacoes:{titulo:'Liquidação',fields:[['data_liq','date','Data'],['valor','num','Valor'],['meio','meio','Meio']]}
};
function editReg(table,id){
  const row=(regData[table]||[]).find(r=>r.id===id); const cfg=REG_EDIT[table];
  if(!row||!cfg){toast('Não é possível editar este registo');return;}
  const meios=[['numerario','Numerário'],['mb','Multibanco'],['tb','Transferência'],['cheque','Cheque-dentista'],['outros','Outros']];
  let h=`<div class="card"><div class="sechead" style="margin-top:0">Editar — ${cfg.titulo}</div>`;
  cfg.fields.forEach(([k,t,lbl])=>{
    const v=row[k]==null?'':row[k];
    if(t==='meio'){
      h+=`<label class="fld">${lbl}</label><select class="fld-in" id="ed_${k}">`+meios.map(m=>`<option value="${m[0]}"${row[k]===m[0]?' selected':''}>${m[1]}</option>`).join('')+`</select>`;
    }else{
      const it=t==='date'?'date':(t==='num'?'number':'text'), step=t==='num'?' step="0.01"':'';
      h+=`<label class="fld">${lbl}</label><input class="fld-in" id="ed_${k}" type="${it}"${step} value="${v}">`;
    }
  });
  h+=`<button class="btn" onclick="saveReg('${table}','${id}')">Guardar</button>
      <button class="btn sec" style="margin-top:8px" onclick="loadRegistos()">Cancelar</button></div>`;
  $('rgOut').innerHTML=h;
}
async function saveReg(table,id){
  const cfg=REG_EDIT[table]; const row=(regData[table]||[]).find(r=>r.id===id)||{};
  const upd={};
  cfg.fields.forEach(([k,t])=>{const el=$('ed_'+k);if(!el)return;let v=el.value;if(t==='num')v=parseFloat(v)||0;upd[k]=v;});
  if(cfg.after){const merged={...row,...upd};cfg.after(merged);if('total_geral'in merged)upd.total_geral=merged.total_geral;}
  const {error}=await sb.from(table).update(upd).eq('id',id);
  if(error){toast('Erro: '+error.message);return;}
  toast('Registo atualizado ✓'); loadRegistos();
}

async function uploadDocs(){
  const fi=$('dkFile'); if(!fi||!fi.files.length){toast('Escolhe pelo menos um ficheiro');return;}
  const tipo=$('dkTipo').value, clinica_id=$('dkClin').value||null, data=$('dkData').value,

  if(!data){toast('Indica a data');return;}
  if(!UID){toast('Sessão sem ID — entra de novo');return;}
  const ym=data.slice(0,7); let ok=0,fail=0;
  toast('A enviar…');
  for(const file of fi.files){
    try{
      const id=crypto.randomUUID(), safe=file.name.replace(/[^\w.\-]+/g,'_'), path=`${UID}/${ym}/${id}_${safe}`;
      const up=await sb.storage.from('comprovativos').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});
      if(up.error){fail++;continue;}
      const ins=await sb.from('caixa_docs').insert({id,tipo,clinica_id,data,descricao,valor,path,filename:file.name,mime:file.type});
      if(ins.error){fail++;}else ok++;
    }catch(e){fail++;}
  }
  toast(`${ok} guardado(s)${fail?` · ${fail} falhou`:''} ✓`);
  if(ok){docsMes=ym;renderDocs();}
}

function monthLabel(ym){const [y,m]=ym.split('-').map(Number);const M=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];return `${M[m-1]} ${y}`;}
function monthLabelCap(ym){const s=monthLabel(ym);return s.charAt(0).toUpperCase()+s.slice(1);}
function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});}
async function buildZipBlob(){
  const zip=new JSZip(), used={};
  for(const d of docsData){
    const {data,error}=await sb.storage.from('comprovativos').download(d.path);
    if(error||!data)continue;
    const folder=TIPO_LBL[d.tipo]||d.tipo;
    const ext=(d.filename.match(/\.[a-zA-Z0-9]+$/)||[''])[0];
    let base=`${d.data}_${(d.descricao||d.filename.replace(ext,'')).replace(/[^\w.\-]+/g,'_')}`;
    let full=`${folder}/${base}${ext}`, i=2;
    while(used[full]){full=`${folder}/${base}_${i}${ext}`;i++;}
    used[full]=1; zip.file(full,data);
  }
  return await zip.generateAsync({type:'blob'});
}
async function exportZip(){
  if(!docsData.length){toast('Nada para exportar');return;}
  if(typeof JSZip==='undefined'){toast('JSZip não carregou');return;}
  toast('A preparar ZIP…');
  const blob=await buildZipBlob(), url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`Comprovativos_${docsMes}.zip`; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  toast('ZIP gerado ✓');
}
async function enviarDocs(){
  if(!docsData.length){toast('Sem comprovativos neste mês');return;}
  if(typeof JSZip==='undefined'){toast('JSZip não carregou');return;}
  const to=$('emTo').value.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean);
  if(!to.length){toast('Indica pelo menos um destinatário');return;}
  const subject=$('emSubj').value.trim(), body=$('emBody').value, filename=`Comprovativos_${docsMes}.zip`;
  toast('A preparar ZIP…');
  const blob=await buildZipBlob();
  const payload={recipients:to,subject,body,filename};
  if(blob.size<=25*1024*1024){
    payload.zipBase64=await blobToBase64(blob);
  }else{
    toast('ZIP grande — a gerar link…');
    const path=`${UID}/_envios/${Date.now()}_${filename}`;
    const up=await sb.storage.from('comprovativos').upload(path,blob,{contentType:'application/zip',upsert:true});
    if(up.error){toast('Erro a guardar ZIP: '+up.error.message);return;}
    const {data,error}=await sb.storage.from('comprovativos').createSignedUrl(path,604800);
    if(error){toast('Erro no link: '+error.message);return;}
    payload.link=data.signedUrl;
  }
  toast('A enviar email…');
  try{
    const {data,error}=await sb.functions.invoke('enviar-comprovativos',{body:payload});
    if(error){toast('Erro: '+error.message);return;}
    if(data&&data.error){toast('Erro: '+data.error);return;}
    toast('Email enviado ✓');
  }catch(e){toast('Erro: '+e.message);}
}

function pdfMedico(){
  const m=medicos.find(x=>x.id===medSel); const v=getMedVals();
  const mesISO=$('medMes').value, [yy,mm]=mesISO.split('-');
  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mesLbl=`${meses[+mm-1]} de ${yy}`;
  const pct=Math.round((+m.pct_geral)*100);
  const eur=n=>Number(n).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  const L=20; let y=24;
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(27,146,198);
  doc.text('Dentalsaúde',L,y);
  doc.setTextColor(20,24,29); doc.setFontSize(13); y+=10;
  doc.text('Conta — '+m.nome,L,y);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(92,102,112); y+=7;
  doc.text(mesLbl,L,y);
  doc.setDrawColor(220,226,230); y+=5; doc.line(L,y,190,y); y+=10;
  const linha=(lbl,val,bold)=>{doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(20,24,29);
    doc.setFontSize(bold?12:11); doc.text(lbl,L,y); doc.text(eur(val),190,y,{align:'right'}); y+=8;};
  doc.setTextColor(92,102,112); doc.setFontSize(10); doc.text('VALORES DO MÊS',L,y); y+=7;
  let apagar;
  if(m.tem_ortodontia){
    const net=(+v.faturado_ortodontia)-(+v.lab_ortodontia);
    const geral=((+v.total_faturado)-net-(+v.lab_protese)-(+v.branqueamentos)-(+v.exames)-(+v.c04))*(+m.pct_geral);
    const orto=net*(+m.pct_orto); apagar=geral+orto;
    linha('Total apurado (faturado)',(+v.total_faturado));
    linha('Exames de imagiologia',(+v.exames)+(+v.c04));
    linha('Despesas de prótese e branqueamentos',(+v.lab_protese)+(+v.branqueamentos));
    linha('Despesas de Ortodontia',(+v.lab_ortodontia));
    y+=2; doc.setDrawColor(220,226,230); doc.line(L,y,190,y); y+=10;
    doc.setTextColor(92,102,112); doc.setFontSize(10); doc.text('APURAMENTO',L,y); y+=7;
    linha(`Geral (${pct}%)`,geral);
    linha('Total apurado de ortodontia',net);
    linha(`Ortodontia (${Math.round((+m.pct_orto)*100)}%)`,orto);
  } else {
    apagar=((+v.total_faturado)-(+v.exames)-(+v.outros))*(+m.pct_geral);
    linha('Total apurado (faturado)',(+v.total_faturado));
    linha('Exames',(+v.exames));
    linha('Outros',(+v.outros));
  }
  y+=2; doc.setDrawColor(27,146,198); doc.setLineWidth(0.5); doc.line(L,y,190,y); y+=10;
  linha(m.tem_ortodontia?'A pagar':`A pagar (${pct}%)`,apagar,true);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(140,150,160);
  doc.text(`Emitido em ${new Date().toLocaleDateString('pt-PT')} · Dentalsaúde`,L,285);
  const nomeF=m.nome.replace(/[^A-Za-zÀ-ÿ]+/g,'_').replace(/^_|_$/g,'');
  const fname=`Conta_${nomeF}_${mesISO}.pdf`;
  try{ doc.save(fname); }
  catch(e){ try{ window.open(doc.output('bloburl'),'_blank'); }catch(_){ alert('Não consegui gerar o PDF: '+e.message); } }
}

  const {data}=await sb.from('caixa_medicos_lanc').select('*').eq('medico_id',medSel).order('mes',{ascending:false}).limit(12);
  let h='<div class="sechead" style="color:var(--muted)">Histórico</div><table><tr><th>Mês</th><th>A pagar</th></tr>';
  if(data&&data.length)data.forEach(r=>{const mm=r.mes.slice(0,7);h+=`<tr style="cursor:pointer" onclick="$('medMes').value='${mm}';loadMedMes()"><td>${mm}</td><td>${fmt(calcMed(m,r))}</td></tr>`;});
  else h+='<tr><td style="text-align:center;color:var(--muted)" colspan="2">sem registos</td></tr>';
  h+='</table>';$('medHist').innerHTML=h;
}

boot();
</script>
